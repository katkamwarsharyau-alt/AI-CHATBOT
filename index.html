<!DOCTYPE html>
<html>
<head>
<title>AI Academic Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("https://images.unsplash.com/photo-1532012197267-da84d127e765") no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.7);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat-container {
    width: 420px;
    height: 550px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    padding: 10px;
    color: white;
}

h2 {
    text-align: center;
    margin: 5px;
}

/* chat area */
#chatbox {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

/* message bubble */
.msg {
    max-width: 70%;
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
    clear: both;
}

/* user message (right) */
.user {
    background: #00c6ff;
    float: right;
    text-align: right;
}

/* bot message (left) */
.bot {
    background: #444;
    float: left;
}

/* input area */
.input-area {
    display: flex;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 5px;
}

button {
    width: 80px;
    margin-left: 5px;
    border: none;
    background: #00c6ff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #0072ff;
}

.logout {
    text-align: center;
    margin-top: 5px;
}

.logout a {
    color: red;
}
</style>
</head>

<body>

<div class="overlay">

<div class="chat-container">

<h2>🎓 AI Chatbot</h2>
<p>Welcome {{ user }} 👋</p>

<div id="chatbox"></div>

<div class="input-area">
<input type="text" id="msg" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>
</div>

<div class="logout">
<a href="/logout">Logout</a>
</div>

</div>

</div>

<script>
function sendMsg() {
    let msg = document.getElementById("msg").value;

    if (msg.trim() === "") return;

    let box = document.getElementById("chatbox");

    // USER MESSAGE
    box.innerHTML += "<div class='msg user'>" + msg + "</div>";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        // BOT MESSAGE
        box.innerHTML += "<div class='msg bot'>" + data.reply + "</div>";
        box.scrollTop = box.scrollHeight;
    });

    document.getElementById("msg").value = "";
}
</script>

</body>
</html>
